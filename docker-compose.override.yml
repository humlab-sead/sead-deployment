services:
  sead_query_api:
    build:
      context: ./sead_query_api
      dockerfile: docker/Dockerfile.dev
    command: >
      sh -c "dotnet watch --project sead.query.api/sead.query.api.csproj run --no-launch-profile --no-restore"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:8089
      ASPNETCORE_APPSETTINGS_FOLDER: /workspace
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
      DOTNET_WATCH_SUPPRESS_LAUNCH_BROWSER: "1"
    volumes:
      - ./sead_query_api:/workspace:Z

  client:
    command: npm run dev -- --port 80
    environment:
      MODE: dev
    volumes:
      - ./sead_browser_client:/sead_browser_client:Z

  json_api_server:
    environment:
      MODE: dev
    ports:
      - "${JAS_PORT}:8484"
    volumes:
      - ./json_api_server:/json_api_server:Z

  mongo:
    ports:
      - "27017:27017"

networks:
  sead_network:
    external: false
