services:
  client:
    command: npm run dev -- --port 80
    environment:
      MODE: dev
    volumes:
      - ./sead_browser_client:/sead_browser_client:Z

  json_api_server:
    environment:
      MODE: dev
    ports:
      - "${JAS_PORT}:8484"
    volumes:
      - ./json_api_server:/json_api_server:Z

  mongo:
    ports:
      - "27017:27017"

  postgresql_mcp_sse:
    image: crystaldba/postgres-mcp:latest
    depends_on:
      postgresql:
        condition: service_healthy
    # Expose SSE (HTTP) so multiple tools/clients can share the same server
    command: ["--access-mode=${MCP_ACCESS_MODE}", "--transport=sse"]
    environment:
      # Compose-network hostname for Postgres is the service name: "postgres"
      DATABASE_URI: postgresql://${DATABASE_READ_ONLY_USER}:${DATABASE_READ_ONLY_PASSWORD}@postgresql:5432/${DATABASE_NAME}
    ports:
      - "${MCP_PORT_SSE}:8000"
    restart: unless-stopped
    networks:
      - sead_network

  postgresql_mcp:
    build:
      context: ./postgres_mcp
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      PGHOST: postgresql
      PGPORT: 5432
      PGUSER: ${DATABASE_READ_ONLY_USER}
      PGPASSWORD: ${DATABASE_READ_ONLY_PASSWORD}
      PGDATABASE: ${DATABASE_NAME}
    ports:
      - "${MCP_PORT}:4000"
    restart: unless-stopped
    networks:
      - sead_network

networks:
  sead_network:
    external: false
